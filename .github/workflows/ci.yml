name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci-linux:
    name: ci-linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install npm dependencies
        run: npm ci

      - name: Validate memory protocol
        run: npm run test:memory-protocol

      - name: Validate public pillars
        run: npm run test:pillars

      - name: Run unit tests
        run: npm run test:unit

      - name: Run UI tests
        run: npm run test:ui

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Check Tauri Rust crate
        run: cargo check --manifest-path src-tauri/Cargo.toml

  e2e-linux:
    name: e2e-linux
    runs-on: ubuntu-24.04
    needs: ci-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend for preview server
        run: npm run build

      - name: Run focused browser smoke
        run: npx playwright test e2e/calc-audit0-smoke.spec.ts --project=chromium
